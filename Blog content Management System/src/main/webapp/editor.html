<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write - NeuraNotes</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/shared.css">
    <link rel="stylesheet" href="styles/editor.css">
    <link rel="stylesheet" href="styles/notifications.css">
</head>
<body>

    <!-- Editor Header -->
    <header class="navbar-fixed">
        <div class="d-flex align-items-center">
            <a href="index.html" class="brand-logo">NeuraNotes</a>
            <span class="editor-status d-none d-sm-block">Draft in Miguelabera</span>
        </div>
        <div class="d-flex align-items-center gap-4 ms-auto">
            <button id="themeToggle" class="theme-switch mx-3" title="Toggle Theme" onclick="toggleAppTheme()">
                <div class="switch-knob">
                    <i class="bi bi-sun-fill"></i>
                </div>
            </button>

            <div class="dropdown">
                <a href="#" class="nav-link-item position-relative text-decoration-none" data-bs-toggle="dropdown" id="notificationBell">
                    <i class="bi bi-bell fs-5"></i>
                    <span class="notification-badge d-none badge rounded-pill bg-success" style="position: absolute; top: -5px; right: -5px; font-size: 0.6rem;">0</span>
                </a>
                <div class="dropdown-menu dropdown-menu-end shadow border-0 p-0 notification-dropdown" style="width: 320px; border-radius: 12px; overflow: hidden; margin-top: 15px;">
                    <div class="p-3 border-bottom d-flex justify-content-between align-items-center bg-light">
                        <span class="fw-bold small">Notifications</span>
                        <button class="btn btn-sm btn-link text-success p-0 text-decoration-none mark-all-read" style="font-size: 0.75rem;">Mark all as read</button>
                    </div>
                    <div id="notificationList" class="notification-list" style="max-height: 350px; overflow-y: auto;">
                        <div class="p-4 text-center text-muted small">All caught up!</div>
                    </div>
                </div>
            </div>

            <button class="btn-pill-green">Publish</button>
            
            <div class="dropdown">
                <a href="#" data-bs-toggle="dropdown">
                    <img src="https://ui-avatars.com/api/?name=User&background=1a8917&color=fff" class="user-avatar" alt="Profile" style="width: 36px; height: 36px; border-radius: 50%;">
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-3 p-2" style="border-radius: 12px; min-width: 200px;">
                    <li><a class="dropdown-item rounded-3 py-2 small" href="profile.html"><i class="bi bi-person me-2"></i> Profile</a></li>
                    <li><a class="dropdown-item rounded-3 py-2 small" href="library.html"><i class="bi bi-bookmarks me-2"></i> Library</a></li>
                    <li><a class="dropdown-item rounded-3 py-2 small" href="stories.html"><i class="bi bi-file-text me-2"></i> Stories</a></li>
                    <li><a class="dropdown-item rounded-3 py-2 small" href="stats.html"><i class="bi bi-bar-chart me-2"></i> Stats</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item rounded-3 py-2 small" href="settings.html"><i class="bi bi-gear me-2"></i> Settings</a></li>
                    <li><a class="dropdown-item rounded-3 py-2 small text-danger logout-btn" href="#"><i class="bi bi-box-arrow-right me-2"></i> Sign out</a></li>
                </ul>
            </div>
        </div>
    </header>

    <!-- Writing Area -->
    <div class="editor-container">
        <!-- Category Selection -->
        <div class="mb-4">
            <select id="post-category" class="form-select form-select-sm" style="width: auto; border-radius: 20px;">
                <option value="Uncategorized">Select Category</option>
                <option value="Technology">Technology</option>
                <option value="Design">Design</option>
                <option value="Psychology">Psychology</option>
                <option value="Data Science">Data Science</option>
                <option value="Programming">Programming</option>
                <option value="Art">Art</option>
                <option value="Engineering">Engineering</option>
                <option value="Songs">Songs</option>
                <option value="Military">Military</option>
                <option value="Cybersecurity">Cybersecurity</option>
                <option value="Business">Business</option>
                <option value="Health">Health</option>
                <option value="Travel">Travel</option>
                <option value="Food">Food</option>
                <option value="Science">Science</option>
                <option value="History">History</option>
                <option value="Philosophy">Philosophy</option>
                <option value="Sports">Sports</option>
                <option value="Gaming">Gaming</option>
                <option value="Politics">Politics</option>
                <option value="Finance">Finance</option>
                <option value="DIY & Crafts">DIY & Crafts</option>
                <option value="Marketing">Marketing</option>
                <option value="Education">Education</option>
                <option value="Fitness">Fitness</option>
                <option value="Literature">Literature</option>
                <option value="Photography">Photography</option>
                <option value="Fashion">Fashion</option>
                <option value="Environment">Environment</option>
                <option value="Animals">Animals</option>
                <option value="Space">Space</option>
                <option value="Robotics">Robotics</option>
                <option value="Cryptography">Cryptography</option>
                <option value="Mental Health">Mental Health</option>
                <option value="Relationships">Relationships</option>
                <option value="Personal Development">Personal Development</option>
                <option value="Architecture">Architecture</option>
                <option value="Astronomy">Astronomy</option>
                <option value="Cryptocurrencies">Cryptocurrencies</option>
                <option value="Web Development">Web Development</option>
            </select>
        </div>

        <!-- Title Input -->
        <input type="text" class="input-title" placeholder="Title" id="post-title">

        <!-- Body Area with floating button -->
        <div class="d-flex align-items-start gap-3">
            <button class="add-btn-circle mt-1" title="Add multimedia">
                <i class="bi bi-plus-lg"></i>
            </button>
            <textarea class="input-body" placeholder="Tell your story..." id="post-body"></textarea>
        </div>
    </div>

    <div class="bottom-notification">
        Select text to change formatting, add headers, or create links.
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/ui.js"></script>
    <script type="module" src="scripts/apps/GlobalApp.js"></script>
    <script type="module" src="scripts/editor.js"></script>
</body>
</html>
