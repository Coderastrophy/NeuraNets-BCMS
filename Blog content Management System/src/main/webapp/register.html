<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join NeuraNotes</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/landing.css">
    <link rel="stylesheet" href="styles/login.css">
    <link rel="stylesheet" href="styles/notifications.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles/editor.css">
</head>
<body>

    <div class="theme-toggle-fixed">
        <button id="themeToggle" class="theme-switch" title="Toggle Theme" onclick="toggleAppTheme()">
            <div class="switch-knob">
                <i class="bi bi-sun-fill"></i>
            </div>
        </button>
    </div>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg fixed-top bg-white border-bottom">
        <div class="container-fluid px-4 px-lg-5">
            <a class="navbar-brand brand-logo" href="landing.html">NeuraNotes</a>
            <div class="ms-auto">
                <span class="text-muted small me-2">Already have an account?</span>
                <a href="login.html" class="btn btn-outline-dark btn-sm rounded-pill px-3">Sign in</a>
            </div>
        </div>
    </nav>

    <!-- Register Container -->
    <div class="login-container">
        <h2 class="text-center mb-4 fw-bold serif-font">Join NeuraNotes.</h2>
        <div class="text-center mb-4 text-muted">
            Create an account to start writing and connecting.
        </div>
        
        <form id="registerForm">
            <div class="mb-3">
                <label for="username" class="form-label small text-muted">Username</label>
                <input type="text" class="form-control border-0 border-bottom rounded-0 px-0" id="username" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label small text-muted">Password</label>
                <input type="password" class="form-control border-0 border-bottom rounded-0 px-0" id="password" required>
            </div>
            
            <div id="error-message" class="text-danger small mb-3 text-center" style="display: none;">
                Registration failed.
            </div>

            <button type="submit" class="btn btn-dark w-100 rounded-pill py-2 mb-3">Sign up</button>
            
            <div class="text-center small text-muted">
                By signing up, you agree to our Terms of Service.
            </div>
        </form>
    </div>

    <script type="module" src="scripts/apps/GlobalApp.js"></script>
    <script type="module" src="scripts/register.js?v=2"></script>
</body>
</html>
