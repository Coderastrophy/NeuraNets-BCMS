<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Blog CMS</title>
    <link rel="stylesheet" href="styles/landing.css">
    <link rel="stylesheet" href="styles/login.css">
    <link rel="stylesheet" href="styles/notifications.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

    <div class="theme-toggle-fixed">
        <button id="themeToggle" class="theme-switch" title="Toggle Theme" onclick="toggleAppTheme()">
            <div class="switch-knob">
                <i class="bi bi-sun-fill"></i>
            </div>
        </button>
    </div>

    <!-- Join NeuraNotes (Registration page) navigation handled via the Sign in button above -->

    <div class="login-container">
        <div class="login-card">
            <h2 class="serif-font">Welcome back.</h2>
            <p class="subtitle">Log in to your account</p>
            
            <form id="loginForm">
                <div class="form-group mb-3">
                    <label for="username" class="small text-muted">Username</label>
                    <input type="text" id="username" class="form-control border-0 border-bottom rounded-0 px-0" required>
                </div>
                
                <div class="form-group mb-4">
                    <label for="password" class="small text-muted">Password</label>
                    <input type="password" id="password" class="form-control border-0 border-bottom rounded-0 px-0" required>
                </div>
                
                <div id="errorMessage" class="text-danger small mb-3"></div>
                
                <button type="submit" class="btn btn-dark w-100 rounded-pill py-2 mb-4">Continue</button>
            </form>
            
            <div class="register-link">
                No account? <a href="register.html">Create one</a>
            </div>
            
            <a href="landing.html" class="back-btn mt-3 d-inline-block text-muted text-decoration-none small"><i class="bi bi-arrow-left me-1"></i> Go Back</a>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="scripts/apps/GlobalApp.js"></script>
    <script type="module" src="scripts/login.js?v=2"></script>
</body>
</html>
