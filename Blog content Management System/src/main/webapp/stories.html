<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stories - NeuraNotes</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/shared.css">
    <link rel="stylesheet" href="styles/stories.css">
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="navbar navbar-fixed border-bottom">
        <div class="nav-left">
            <button class="hamburger-btn" onclick="toggleSidebar()">
                <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <a href="index.html" class="brand-logo ms-3 text-decoration-none fw-bold fs-4">NeuraNotes</a>
            <div class="search-box d-none d-md-block ms-4">
                <i class="bi bi-search search-icon"></i>
                <input type="text" class="search-input" placeholder="Search">
            </div>
        </div>

        <div class="nav-right d-flex align-items-center">
            <a href="editor.html" class="nav-link-item d-none d-sm-flex me-4 text-decoration-none">
                <i class="bi bi-pencil-square fs-5"></i> Write
            </a>
            
            <button id="themeToggle" class="theme-switch mx-3" title="Toggle Theme" onclick="toggleAppTheme()">
                <div class="switch-knob">
                    <i class="bi bi-sun-fill"></i>
                </div>
            </button>
            
            <div class="dropdown me-3">
                <a href="#" class="nav-link-item position-relative text-decoration-none" data-bs-toggle="dropdown" id="notificationBell">
                    <i class="bi bi-bell fs-5"></i>
                    <span class="notification-badge d-none badge rounded-pill bg-success" style="position: absolute; top: -5px; right: -5px; font-size: 0.6rem;">0</span>
                </a>
                <div class="dropdown-menu dropdown-menu-end shadow border-0 p-0 notification-dropdown" style="width: 320px; border-radius: 12px; overflow: hidden; margin-top: 15px;">
                    <div class="p-3 border-bottom d-flex justify-content-between align-items-center bg-light">
                        <span class="fw-bold small">Notifications</span>
                        <button class="btn btn-sm btn-link text-success p-0 text-decoration-none mark-all-read" style="font-size: 0.75rem;">Mark all as read</button>
                    </div>
                    <div id="notificationList" class="notification-list" style="max-height: 350px; overflow-y: auto;">
                        <div class="p-4 text-center text-muted small">All caught up!</div>
                    </div>
                </div>
            </div>

            <div class="dropdown">
                <a href="#" data-bs-toggle="dropdown">
                    <img src="https://ui-avatars.com/api/?name=User&background=1a8917&color=fff" class="user-avatar" alt="Profile" style="width: 36px; height: 36px; border-radius: 50%;">
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-3 p-2" style="border-radius: 12px; min-width: 200px;">
                    <li><a class="dropdown-item rounded-3 py-2 small" href="profile.html"><i class="bi bi-person me-2"></i> Profile</a></li>
                    <li><a class="dropdown-item rounded-3 py-2 small" href="library.html"><i class="bi bi-bookmarks me-2"></i> Library</a></li>
                    <li><a class="dropdown-item rounded-3 py-2 small" href="stories.html"><i class="bi bi-file-text me-2"></i> Stories</a></li>
                    <li><a class="dropdown-item rounded-3 py-2 small" href="stats.html"><i class="bi bi-bar-chart me-2"></i> Stats</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item rounded-3 py-2 small" href="settings.html"><i class="bi bi-gear me-2"></i> Settings</a></li>
                    <li><a class="dropdown-item rounded-3 py-2 small text-danger logout-btn" href="#"><i class="bi bi-box-arrow-right me-2"></i> Sign out</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="layout-container">
        <!-- Sidebar -->
        <div class="left-sidebar" id="leftSidebar">
            <div class="sidebar-content">
                 <a href="index.html" class="sidebar-menu-item"><i class="bi bi-house-door"></i> Home</a>
                 <a href="profile.html" class="sidebar-menu-item"><i class="bi bi-person"></i> Profile</a>
                 <a href="library.html" class="sidebar-menu-item"><i class="bi bi-bookmarks"></i> Library</a>
                 <a href="stories.html" class="sidebar-menu-item active"><i class="bi bi-file-text-fill"></i> Stories</a>
                 <a href="stats.html" class="sidebar-menu-item"><i class="bi bi-bar-chart"></i> Stats</a>

                 <hr class="my-4 text-muted opacity-25">
                 
                 <a href="#" class="sidebar-menu-item"><i class="bi bi-gear"></i> Settings</a>
                 <a href="#" class="sidebar-menu-item"><i class="bi bi-question-circle"></i> Help</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-3" style="max-width: 1000px;">
                <h1 class="fw-bold display-5 m-0">Stories</h1>
                <div>
                    <input type="file" id="import-file" style="display: none;" accept=".txt,.md,.html">
                    <button class="btn-pill-outline me-2" onclick="document.getElementById('import-file').click()">Import a story</button>
                    <a href="editor.html" class="btn btn-pill-green text-decoration-none">Write a story</a>
                </div>
            </div>

            <div class="dash-tabs" style="max-width: 1000px;">
                <a href="#" class="dash-tab active">Drafts</a>
                <a href="#" class="dash-tab">Scheduled</a>
                <a href="#" class="dash-tab">Published <span class="dash-count">1</span></a>
            </div>

            <!-- Empty State -->
            <div class="text-center mt-5 pt-5" style="max-width: 1000px;">
                <p class="fs-5 mb-1 text-dark">No stories in draft.</p>
                <p class="text-muted">Why not <a href="editor.html" class="text-dark text-decoration-underline">start writing one?</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/ui.js"></script>
    <script type="module" src="scripts/apps/GlobalApp.js"></script>
    <script src="scripts/stories.js"></script>
</body>
</html>
